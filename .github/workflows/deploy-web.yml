
# Validated by User: yes
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_run:
    workflows: ["Update Exam Data", "Update Collection Index", "Validate Generated Artifacts", "CI"]
    types:
      - completed
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false


jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    # Refined Trigger Logic:
    # 1. Always run on Push
    # 2. On 'workflow_run' (Auto Update), ONLY run if:
    #    - The update workflow Succeeded
    #    - The update workflow ran on 'main' branch
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && 
       github.event.workflow_run.conclusion == 'success' && 
       github.event.workflow_run.head_branch == 'main')
    
    outputs:
      skip_deploy: ${{ steps.check_updates.outputs.skip_deploy }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # Optimization: Skip build if upstream automation didn't change anything
      # Logic: github.event.workflow_run.head_sha is the commit auto-update RAN on.
      #        HEAD is the current commit (which might be a new commit pushed by auto-update).
      #        If they are the same, it means auto-update did not push a new commit.
      - name: Check for updates
        if: github.event_name == 'workflow_run'
        run: |
          TRIGGER_SHA=${{ github.event.workflow_run.head_sha }}
          CURRENT_SHA=$(git rev-parse HEAD)
          echo "Trigger SHA: $TRIGGER_SHA"
          echo "Current SHA: $CURRENT_SHA"
          
          if [ "$TRIGGER_SHA" == "$CURRENT_SHA" ]; then
            echo "No changes detected from auto-update. Skipping deployment."
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Changes detected. Proceeding."
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi
        id: check_updates

      - name: Setup Node.js ⚙️
        if: steps.check_updates.outputs.skip_deploy != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies 📦
        if: steps.check_updates.outputs.skip_deploy != 'true'
        run: npm ci

      - name: Lint code 🧹
        if: steps.check_updates.outputs.skip_deploy != 'true'
        run: npm run lint

      - name: Run tests 🧪
        if: steps.check_updates.outputs.skip_deploy != 'true'
        run: npm test

      - name: Typecheck 🧾
        if: steps.check_updates.outputs.skip_deploy != 'true'
        run: npm run typecheck

      - name: Build project 🏗️
        if: steps.check_updates.outputs.skip_deploy != 'true'
        run: npm run build

      - name: Setup Pages
        if: steps.check_updates.outputs.skip_deploy != 'true'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: steps.check_updates.outputs.skip_deploy != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # Deployment job
  deploy:
    # Only run if build job actually uploaded an artifact
    if: needs.build.outputs.skip_deploy != 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Purge Cloudflare Cache
        if: success()
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'


