name: Update Collection Index

on:
  repository_dispatch:
    types: [ sitegraph-data-updated ]
  workflow_dispatch:
    inputs:
      sitegraph_ref:
        description: 'njupt-site-graph ref to consume'
        required: false
        type: string
        default: 'main'

permissions:
  contents: write

concurrency:
  group: update-collection-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-collection-index:
    runs-on: ubuntu-latest
    env:
      SITEGRAPH_REF: ${{ github.event.client_payload.sitegraph_ref || github.event.inputs.sitegraph_ref || 'main' }}
      DISPATCH_SITEGRAPH_REF: ${{ github.event.client_payload.sitegraph_ref || '' }}
      DISPATCH_SOURCE_REPO: ${{ github.event.client_payload.source_repo || '' }}
      DISPATCH_SOURCE_RUN_ID: ${{ github.event.client_payload.source_run_id || '' }}
      DISPATCH_REASON: ${{ github.event.client_payload.dispatch_reason || '' }}
      SITEGRAPH_CHANGED: ${{ github.event.client_payload.sitegraph_changed || '' }}
      NJUPT_SITEGRAPH_REPO: _sitegraph/njupt-site-graph
      COLLECTION_DIR: apps/web/public/generated/collections/njupt-public

    steps:
      - name: Checkout njupt-search
        uses: actions/checkout@v6

      - name: Validate update trigger context
        run: |
          if [ "$GITHUB_EVENT_NAME" = "repository_dispatch" ]; then
            if [ -z "$DISPATCH_SITEGRAPH_REF" ]; then
              echo "::error::repository_dispatch missing client_payload.sitegraph_ref"
              exit 1
            fi
            if [ "$DISPATCH_SOURCE_REPO" != "hicancan/njupt-site-graph" ]; then
              echo "::error::repository_dispatch source_repo must be hicancan/njupt-site-graph"
              exit 1
            fi
            if [ -z "$DISPATCH_SOURCE_RUN_ID" ]; then
              echo "::error::repository_dispatch missing client_payload.source_run_id"
              exit 1
            fi
          fi
          echo "event_name=$GITHUB_EVENT_NAME"
          echo "sitegraph_ref=$SITEGRAPH_REF"
          echo "source_repo=${DISPATCH_SOURCE_REPO:-manual-or-unspecified}"
          echo "source_run_id=${DISPATCH_SOURCE_RUN_ID:-manual-or-unspecified}"
          echo "sitegraph_changed=${SITEGRAPH_CHANGED:-unspecified}"
          echo "dispatch_reason=${DISPATCH_REASON:-unspecified}"

      - name: Validate sitegraph ref exists
        env:
          GH_TOKEN: ${{ secrets.NJUPT_SITEGRAPH_TOKEN || github.token }}
        run: |
          if ! gh api "repos/hicancan/njupt-site-graph/commits/$SITEGRAPH_REF" --silent; then
            echo "::error::sitegraph_ref $SITEGRAPH_REF is not a commit visible in hicancan/njupt-site-graph"
            exit 1
          fi

      - name: Checkout sitegraph source packages
        uses: actions/checkout@v6
        with:
          repository: hicancan/njupt-site-graph
          ref: ${{ env.SITEGRAPH_REF }}
          path: _sitegraph/njupt-site-graph
          token: ${{ secrets.NJUPT_SITEGRAPH_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .[test]
          npm ci

      - name: Build collection artifacts
        run: |
          python -m njupt_search_indexer validate --skip-output
          python -m njupt_search_indexer build --collection-id njupt-public --out "$COLLECTION_DIR"
          python -m njupt_search_indexer validate --collection "$COLLECTION_DIR"

      - name: Validate generated collection artifacts
        run: |
          python tools/quality-gates/scripts/validate_search_index.py
          python tools/quality-gates/scripts/check_public_artifact_sizes.py
          python -m njupt_search_eval run-smoke-queries --collection "$COLLECTION_DIR"
          python -m njupt_search_eval run-task-queries --collection "$COLLECTION_DIR"

      - name: Frontend checks
        run: |
          npm test
          npm run typecheck
          npm run build

      - name: Commit collection artifact changes
        run: |
          python tools/ci/commit_generated_changes.py \
            --message "Auto-update collection index" \
            --add apps/web/public/generated/collections/njupt-public/
