name: Release Android

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Decode Keystore
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android.keystore

      - name: Build APK and AAB with Gradle
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Extract Version and Rename Artifacts
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            RELEASE_TAG="${{ github.ref_name }}"
          else
            RELEASE_TAG="v$VERSION"
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          
          # Rename generated APK
          cd android/app/build/outputs/apk/release
          mv app-release.apk njupt-search-${RELEASE_TAG}.apk
          cp njupt-search-${RELEASE_TAG}.apk njupt-search-latest.apk
          
          # Rename generated AAB
          cd ../../bundle/release
          mv app-release.aab njupt-search-${RELEASE_TAG}.aab

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: njupt-search-apk
          path: |
            android/app/build/outputs/apk/release/njupt-search-*.apk
            android/app/build/outputs/bundle/release/njupt-search-*.aab
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/njupt-search-*.apk
            android/app/build/outputs/bundle/release/njupt-search-*.aab
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          generate_release_notes: true
