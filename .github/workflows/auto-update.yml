name: Auto Update Search Data

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_llm:
        description: 'Force re-run LLM enrichment cache'
        required: false
        type: boolean
        default: false
      source_id:
        description: 'Optional single source id, for example jwc or github:owner/repo'
        required: false
        type: string
        default: ''
      limit:
        description: 'Optional maximum number of documents to send to LLM'
        required: false
        type: string
        default: ''
      llm_provider:
        description: 'LLM provider: auto, deepseek, or gemini'
        required: false
        type: choice
        options:
          - auto
          - deepseek
          - gemini
        default: auto
      llm_batch_size:
        description: 'Maximum documents per LLM batch'
        required: false
        type: string
        default: '32'

permissions:
  contents: write

concurrency:
  group: auto-update-search-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/scripts
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Exam Crawler
        run: |
          python scripts/auto_update_exam_data.py
          
      - name: Process Excel Files
        run: |
          python scripts/analyze_and_update.py

      - name: Fetch High Star GitHub Repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NJUPT_SEARCH_GITHUB_TOKEN: ${{ secrets.NJUPT_SEARCH_GITHUB_TOKEN }}
        run: |
          python scripts/crawlers/fetch_github_repos.py

      - name: Build Campus Search Index
        env:
          NJUPT_SEARCH_GITHUB_TOKEN: ${{ secrets.NJUPT_SEARCH_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force_llm }}" = "true" ]; then
            ARGS="$ARGS --force-llm"
          fi
          if [ -n "${{ github.event.inputs.source_id }}" ]; then
            ARGS="$ARGS --source ${{ github.event.inputs.source_id }}"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.llm_provider }}" ]; then
            ARGS="$ARGS --llm-provider ${{ github.event.inputs.llm_provider }}"
          fi
          if [ -n "${{ github.event.inputs.llm_batch_size }}" ]; then
            ARGS="$ARGS --llm-batch-size ${{ github.event.inputs.llm_batch_size }}"
          fi
          python scripts/update_search_index.py $ARGS

      - name: Python integrity checks
        run: |
          python -m py_compile scripts/update_search_index.py scripts/core/llm_scorer.py scripts/utils/validate_search_index.py scripts/models/semantic_model.py
          python scripts/test_llm_batching.py

      - name: Validate Campus Search Index
        run: |
          python scripts/utils/validate_search_index.py
          
      - name: Check for changes
        id: git-check
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/ public/index/ config/github_search_sources.json
          if [ -f cache/search_llm_cache.json ]; then
            git add cache/search_llm_cache.json
          fi
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and Push
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git commit -m "🤖 Auto-update njupt-search data"
          git push
