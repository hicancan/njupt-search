name: Auto Update Search Data

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Exam Crawler
        run: |
          python scripts/auto_update_exam_data.py
          
      - name: Process Excel Files
        run: |
          python scripts/analyze_and_update.py

      - name: Fetch High Star GitHub Repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NJUPT_SEARCH_GITHUB_TOKEN: ${{ secrets.NJUPT_SEARCH_GITHUB_TOKEN }}
        run: |
          python scripts/fetch_github_repos.py

      - name: Build Campus Search Index
        env:
          NJUPT_SEARCH_GITHUB_TOKEN: ${{ secrets.NJUPT_SEARCH_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update_search_index.py
          
      - name: Check for changes
        id: git-check
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/ public/index/ config/github_search_sources.json
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and Push
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git commit -m "🤖 Auto-update njupt-search data"
          git push
