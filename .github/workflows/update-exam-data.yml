name: Update Exam Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-exam-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-exam-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .[test]
          npm ci

      - name: Update exam artifacts
        run: python -m njupt_exam_pipeline run

      - name: Validate generated artifacts and app
        run: |
          python -m pytest
          npm test
          npm run typecheck
          npm run build

      - name: Commit exam artifact changes
        run: |
          python tools/ci/commit_generated_changes.py \
            --message "Auto-update exam data" \
            --add apps/web/public/generated/exam/
