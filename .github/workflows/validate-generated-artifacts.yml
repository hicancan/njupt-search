name: Validate Generated Artifacts

on:
  push:
    branches: [ main, 'milestone/**' ]
    paths:
      - 'apps/web/public/generated/**'
      - 'tools/**'
      - 'packages/contracts/**'
      - '.github/workflows/validate-generated-artifacts.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-generated-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python tools
        run: |
          python -m pip install -U pip
          python -m pip install -e .[test]

      - name: Validate generated artifacts
        run: |
          python tools/quality-gates/scripts/validate_search_index.py
          python tools/quality-gates/scripts/check_public_artifact_sizes.py
          python -m njupt_search_eval run-smoke-queries
          python -m njupt_search_eval run-task-queries
